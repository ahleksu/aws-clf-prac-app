<p-toast />

<main class="join-page">
  <section class="join-panel">
    <div class="join-copy">
      <p class="eyebrow">Live quiz</p>
      <h1>Join a Session</h1>
    </div>

    <!-- Checking -->
    @if (serverHealth.isOnline() === null) {
      <div class="flex flex-col items-center gap-3 py-6 text-gray-500 text-sm">
        <i class="pi pi-spin pi-spinner text-2xl"></i>
        <span>Checking server status…</span>
      </div>
    }

    <!-- Offline fallback -->
    @if (serverHealth.isOnline() === false) {
      <div class="offline-banner">
        <i class="pi pi-exclamation-triangle offline-icon"></i>
        <div>
          <p class="offline-title">Server Offline</p>
          <p class="offline-body">
            The live session backend is temporarily unavailable.
            <a
              href="https://www.linkedin.com/in/ahleksu"
              target="_blank"
              rel="noopener noreferrer"
              class="offline-link"
            >Contact me on LinkedIn</a> for further details.
          </p>
        </div>
      </div>
      <p-button
        label="Back to Home"
        icon="pi pi-home"
        severity="secondary"
        styleClass="w-full"
        (onClick)="cancelSession()"
      />
    }

    <!-- Online: normal form -->
    @if (serverHealth.isOnline() === true) {
      <form class="join-form" (ngSubmit)="joinSession()">
        <label>
          <span>Session code</span>
          <input
            pInputText
            name="sessionCode"
            [(ngModel)]="sessionCode"
            maxlength="6"
            autocomplete="off"
            inputmode="text"
            (ngModelChange)="normalizeCode()"
          />
        </label>

        <label>
          <span>Nickname</span>
          <input
            pInputText
            name="nickname"
            [(ngModel)]="nickname"
            maxlength="20"
            autocomplete="nickname"
            (ngModelChange)="normalizeNickname()"
          />
        </label>

        <p-button
          type="submit"
          label="Join"
          icon="pi pi-sign-in"
          [disabled]="!canJoin()"
          [loading]="joining"
          styleClass="w-full"
        />
        <p-button
          type="button"
          label="Cancel Session"
          icon="pi pi-home"
          severity="secondary"
          styleClass="w-full"
          [disabled]="joining"
          (onClick)="cancelSession()"
        />
      </form>
    }
  </section>
</main>
